<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个性化设置</title>
<link rel="icon" type="image/x-icon" href="{{ icon_path | default('/static/cu.jpg') }}">
<link href="/static/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdmirror.com/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/static/css/main.css" rel="stylesheet">
<link href="/static/css/animate-custom.css" rel="stylesheet">
<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/dark-mode.js"></script>
<style>
.config-page {
  max-width: 650px;
  margin: 2rem auto;
  padding: 0 1rem;
}
.page-header {
  padding-top: 1rem;
}
.gradient-text {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 0.2rem rgba(129, 140, 248, 0.25);
}
.toast-container {
  position: fixed;
  top: 80px;
  right: 20px;
  z-index: 1060;
}
.preview-img {
  max-width: 100%;
  max-height: 150px;
  border-radius: 8px;
  object-fit: cover;
}
.preview-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--primary);
}
.preview-hero {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--primary);
}
.file-input {
  display: none;
}
</style>
</head>
<body>
{% include 'navbar.html' %}

<div class="container config-page">
  <div class="page-header mb-4 animate-fade-in-up">
    <h2 class="gradient-text" style="font-size: 1.75rem; font-weight: 700;">
      <i class="bi bi-palette me-2"></i>个性化设置
    </h2>
    <p class="text-muted mb-0">自定义您的专属体验</p>
  </div>

  <!-- 背景图片卡片 -->
  <div class="glass-panel p-4 mb-4 animate-card-bounce">
    <h5 class="mb-3"><i class="bi bi-image me-2"></i>背景图片</h5>
    <div class="text-center mb-3">
      <img id="bgPreview" class="preview-img" src="" alt="背景预览">
    </div>
    <div class="d-flex gap-2">
      <input type="file" id="bgInput" class="file-input" accept="image/*" onchange="previewBgImage(this)">
      <button class="btn btn-outline-primary" onclick="document.getElementById('bgInput').click()">
        <i class="bi bi-upload me-1"></i>上传
      </button>
      <button class="btn btn-primary" onclick="saveBgImage()">
        <i class="bi bi-check-lg me-1"></i>保存
      </button>
      <button class="btn btn-outline-secondary" onclick="resetBgImage()">
        <i class="bi bi-arrow-counterclockwise me-1"></i>恢复默认
      </button>
    </div>
  </div>

  <!-- 图标头像卡片 -->
  <div class="glass-panel p-4 mb-4 animate-card-bounce animate-delay-1">
    <h5 class="mb-3"><i class="bi bi-bookmark-star me-2"></i>图标头像（标签页 + 导航栏）</h5>
    <div class="text-center mb-3">
      <img id="iconPreview" class="preview-icon" src="{{ icon_path | default('/static/cu.jpg') }}" alt="图标预览" onerror="this.src='/static/cu.jpg'">
    </div>
    <div id="iconStatus" class="text-muted small mb-2">当前状态：默认</div>
    <div class="d-flex gap-2">
      <input type="file" id="iconInput" class="file-input" accept="image/*" onchange="previewIcon(this)">
      <button class="btn btn-outline-primary" onclick="document.getElementById('iconInput').click()">
        <i class="bi bi-upload me-1"></i>上传
      </button>
      <button class="btn btn-primary" onclick="saveIcon()">
        <i class="bi bi-check-lg me-1"></i>保存
      </button>
      <button class="btn btn-outline-secondary" onclick="resetIcon()">
        <i class="bi bi-arrow-counterclockwise me-1"></i>恢复默认
      </button>
    </div>
  </div>

  <!-- 大字头像卡片 -->
  <div class="glass-panel p-4 animate-card-bounce animate-delay-2">
    <h5 class="mb-3"><i class="bi bi-person-badge me-2"></i>大字头像（主页 + 登录页）</h5>
    <div class="text-center mb-3">
      <img id="heroPreview" class="preview-hero" src="{{ hero_path | default('/static/like.jpg') }}" alt="大字头像预览" onerror="this.src='/static/like.jpg'">
    </div>
    <div id="heroStatus" class="text-muted small mb-2">当前状态：默认</div>
    <div class="d-flex gap-2">
      <input type="file" id="heroInput" class="file-input" accept="image/*" onchange="previewHero(this)">
      <button class="btn btn-outline-primary" onclick="document.getElementById('heroInput').click()">
        <i class="bi bi-upload me-1"></i>上传
      </button>
      <button class="btn btn-primary" onclick="saveHero()">
        <i class="bi bi-check-lg me-1"></i>保存
      </button>
      <button class="btn btn-outline-secondary" onclick="resetHero()">
        <i class="bi bi-arrow-counterclockwise me-1"></i>恢复默认
      </button>
    </div>
  </div>
</div>

<div class="toast-container">
  <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <i class="bi bi-info-circle me-1"></i>
      <strong class="me-auto">提示</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body"></div>
  </div>
</div>

<script>
var currentSettings = {
    icon_type: 'default',
    icon_path: '/static/cu.jpg',
    hero_type: 'default',
    hero_path: '/static/like.jpg',
    bg_path: null
};

window.onload = function() {
    loadSettings();
};

function loadSettings() {
    fetch('/get_personalize_settings', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.status === 'success') {
                currentSettings = data;
                updateUI();
            }
        })
        .catch(function(err) {
            console.error('加载设置失败:', err);
        });
}

function updateUI() {
    // 更新图标预览
    document.getElementById('iconPreview').src = currentSettings.icon_path;
    document.getElementById('iconStatus').textContent = '当前状态：' + (currentSettings.icon_type === 'custom' ? '自定义' : '默认');

    // 更新大字头像预览
    document.getElementById('heroPreview').src = currentSettings.hero_path;
    document.getElementById('heroStatus').textContent = '当前状态：' + (currentSettings.hero_type === 'custom' ? '自定义' : '默认');

    // 更新背景预览
    if (currentSettings.bg_path) {
        document.getElementById('bgPreview').src = currentSettings.bg_path;
    } else {
        document.getElementById('bgPreview').src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100"><rect fill="%23f0f0f0" width="200" height="100"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23999">暂无背景图</text></svg>';
    }
}

function previewBgImage(input) {
    if (input.files && input.files[0]) {
        if (input.files[0].size > 2 * 1024 * 1024) {
            showToast('文件大小不能超过2MB', 'warning');
            input.value = '';
            return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('bgPreview').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function previewIcon(input) {
    if (input.files && input.files[0]) {
        if (input.files[0].size > 2 * 1024 * 1024) {
            showToast('文件大小不能超过2MB', 'warning');
            input.value = '';
            return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('iconPreview').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function previewHero(input) {
    if (input.files && input.files[0]) {
        if (input.files[0].size > 2 * 1024 * 1024) {
            showToast('文件大小不能超过2MB', 'warning');
            input.value = '';
            return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('heroPreview').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function saveBgImage() {
    var input = document.getElementById('bgInput');
    if (!input.files || !input.files[0]) {
        showToast('请先选择图片', 'warning');
        return;
    }

    var formData = new FormData();
    formData.append('background', input.files[0]);

    fetch('/upload_background', {
        method: 'POST',
        body: formData,
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            showToast('背景图片已保存', 'success');
            loadSettings();
            // 刷新页面背景
            document.body.style.backgroundImage = 'url(' + data.path + ')';
        } else {
            throw new Error(data.message || '保存失败');
        }
    })
    .catch(function(err) {
        showToast(err.message, 'danger');
    });
}

function resetBgImage() {
    fetch('/reset_background', {
        method: 'POST',
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            showToast('已恢复默认背景', 'success');
            document.body.style.backgroundImage = '';
            document.getElementById('bgPreview').src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100"><rect fill="%23f0f0f0" width="200" height="100"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23999">暂无背景图</text></svg>';
        } else {
            throw new Error(data.message || '恢复失败');
        }
    })
    .catch(function(err) {
        showToast(err.message, 'danger');
    });
}

function saveIcon() {
    var input = document.getElementById('iconInput');
    if (!input.files || !input.files[0]) {
        showToast('请先选择图片', 'warning');
        return;
    }

    var formData = new FormData();
    formData.append('file', input.files[0]);

    fetch('/upload_icon', {
        method: 'POST',
        body: formData,
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            showToast('图标已保存', 'success');
            loadSettings();
        } else {
            throw new Error(data.message || '保存失败');
        }
    })
    .catch(function(err) {
        showToast(err.message, 'danger');
    });
}

function saveHero() {
    var input = document.getElementById('heroInput');
    if (!input.files || !input.files[0]) {
        showToast('请先选择图片', 'warning');
        return;
    }

    var formData = new FormData();
    formData.append('file', input.files[0]);

    fetch('/upload_hero_avatar', {
        method: 'POST',
        body: formData,
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            showToast('大字头像已保存', 'success');
            loadSettings();
        } else {
            throw new Error(data.message || '保存失败');
        }
    })
    .catch(function(err) {
        showToast(err.message, 'danger');
    });
}

function resetIcon() {
    fetch('/reset_icon', {
        method: 'POST',
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            showToast('已恢复默认图标', 'success');
            loadSettings();
        } else {
            throw new Error(data.message || '恢复失败');
        }
    })
    .catch(function(err) {
        showToast(err.message, 'danger');
    });
}

function resetHero() {
    fetch('/reset_hero_avatar', {
        method: 'POST',
        credentials: 'include'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            showToast('已恢复默认大字头像', 'success');
            loadSettings();
        } else {
            throw new Error(data.message || '恢复失败');
        }
    })
    .catch(function(err) {
        showToast(err.message, 'danger');
    });
}

function showToast(msg, type) {
    var toast = document.getElementById('toast');
    var toastBody = toast.querySelector('.toast-body');
    var toastHeader = toast.querySelector('.toast-header i');

    toast.classList.remove('bg-success', 'bg-danger', 'bg-warning', 'bg-info', 'text-white');
    if (type === 'success') {
        toast.classList.add('bg-success', 'text-white');
        toastHeader.className = 'bi bi-check-circle me-1';
    } else if (type === 'danger') {
        toast.classList.add('bg-danger', 'text-white');
        toastHeader.className = 'bi bi-x-circle me-1';
    } else if (type === 'warning') {
        toast.classList.add('bg-warning', 'text-dark');
        toastHeader.className = 'bi bi-exclamation-circle me-1';
    } else {
        toast.classList.add('bg-info', 'text-white');
        toastHeader.className = 'bi bi-info-circle me-1';
    }

    toastBody.textContent = msg;
    var bsToast = new bootstrap.Toast(toast);
    bsToast.show();
}
</script>
</body>
</html>
