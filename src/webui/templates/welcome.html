<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎 - 初见</title>
    <link rel="icon" type="image/x-icon" href="{{ icon_path | default('/static/cu.jpg') }}">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdmirror.com/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --accent: #f43f5e;
            --glass-bg: rgba(255,255,255,0.39);
            --glass-border: rgba(129,140,248, 0.14);
            --radius-lg: 20px;
        }
        body, html {
            height: 100%; margin: 0;
        }
        body {
            min-height: 100vh;
            background: 
                radial-gradient(ellipse at top left, rgba(129, 140, 248, 0.13) 0%, transparent 55%),
                radial-gradient(ellipse at 30% 70%, rgba(244, 63, 94, 0.08) 0%, transparent 40%),
                #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .welcome-container {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .welcome-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 2rem;
            box-shadow: 0 18px 44px rgba(129, 140, 248, 0.22);
            animation: logoPulse 2s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100%{transform:scale(1); box-shadow: 0 18px 44px rgba(129, 140, 248, 0.22);}
            50%{transform:scale(1.08); box-shadow: 0 25px 60px rgba(129, 140, 248, 0.35);}
        }
        .welcome-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleFadeIn 1s ease-out forwards;
            opacity: 0;
        }
        @keyframes titleFadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .welcome-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            animation: subtitleFadeIn 1s ease-out 0.3s forwards;
            opacity: 0;
        }
        @keyframes subtitleFadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .welcome-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .heart {
            position: absolute;
            font-size: 1.5rem;
            color: var(--primary);
            opacity: 0;
            animation: heartFloat 3s ease-in-out infinite;
        }
        .heart:nth-child(1) {left: 10%; animation-delay: 0s;}
        .heart:nth-child(2) {left: 25%; animation-delay: 0.5s;}
        .heart:nth-child(3) {left: 40%; animation-delay: 1s;}
        .heart:nth-child(4) {left: 55%; animation-delay: 1.5s;}
        .heart:nth-child(5) {left: 70%; animation-delay: 2s;}
        .heart:nth-child(6) {left: 85%; animation-delay: 2.5s;}
        @keyframes heartFloat {
            0% {opacity: 0; transform: translateY(100vh) scale(0.5);}
            20% {opacity: 0.8;}
            80% {opacity: 0.8;}
            100% {opacity: 0; transform: translateY(-20px) scale(1.2);}
        }
        .progress-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(129,140,248,0.2);
            border-radius: 2px;
            margin: 0 auto;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            animation: progress 2s ease-in-out forwards;
            width: 0;
        }
        @keyframes progress {
            from {width: 0;}
            to {width: 100%;}
        }
        .skip-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 1.5s forwards;
        }
        @keyframes fadeIn {
            to {opacity: 1;}
        }
    </style>
</head>
<body>
    <div class="welcome-hearts">
        <span class="heart"><i class="bi bi-heart-fill"></i></span>
        <span class="heart"><i class="bi bi-heart-fill"></i></span>
        <span class="heart"><i class="bi bi-heart-fill"></i></span>
        <span class="heart"><i class="bi bi-heart-fill"></i></span>
        <span class="heart"><i class="bi bi-heart-fill"></i></span>
        <span class="heart"><i class="bi bi-heart-fill"></i></span>
    </div>
    <div class="welcome-container">
        <img src="{{ icon_path | default('/static/cu.jpg') }}" alt="初见logo" class="welcome-logo" onerror="this.src='/static/cu.jpg'">
        <h1 class="welcome-title">欢迎使用初见</h1>
        <p class="welcome-subtitle">每一次对话，都像初次心动</p>
        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
    </div>
    <button class="btn btn-link skip-btn" onclick="skip()">跳过 <i class="bi bi-arrow-right"></i></button>
    <script>
        var targetUrl = '{{ target_url | default("/dashboard") }}';
        
        setTimeout(function() {
            window.location.href = targetUrl;
        }, 2500);
        
        function skip() {
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
