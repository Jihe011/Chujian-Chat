<!-- 视频理解服务提供商选择 -->
<div class="mb-3">
    <select class="form-select mb-2" id="video_omni_provider_select" 
            onchange="updateVideoOmniProvider(this.value)" 
            aria-label="选择视频理解API提供商">
        <option value="qwen-omni" data-url="https://dashscope.aliyuncs.com/compatible-mode/v1" data-register="https://help.aliyun.com/zh/model-studio/get-api-key">阿里云 Qwen-Omni</option>
        <option value="custom">自定义服务提供商</option>
    </select>

    <!-- 自定义URL输入框 -->
    <div id="customVideoOmniInput" class="mb-2" style="display: none;">
        <input type="text" class="form-control" 
               placeholder="请输入自定义服务地址"
               onchange="updateCustomVideoOmniUrl(this.value)">
    </div>

    <!-- 注册链接容器 -->
    <div id="video_omni_register_links" class="d-none">
        <a href="https://help.aliyun.com/zh/model-studio/get-api-key" target="_blank" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-box-arrow-up-right"></i> 获取API密钥
        </a>
    </div>

    <!-- 隐藏的BASE_URL输入框 -->
    <input type="hidden" 
           id="{{ key }}" 
           name="{{ key }}" 
           value="{{ config.value }}">
</div>

<script>
// 初始化视频理解提供商选择
function initVideoOmniProvider() {
    const currentUrl = document.getElementById('{{ key }}').value;
    const providerSelect = document.getElementById('video_omni_provider_select');
    const customInput = document.getElementById('customVideoOmniInput');
    const registerLinks = document.getElementById('video_omni_register_links');
    
    // 查找匹配的选项
    let found = false;
    for (let i = 0; i < providerSelect.options.length; i++) {
        const option = providerSelect.options[i];
        if (option.getAttribute('data-url') === currentUrl) {
            providerSelect.value = option.value;
            updateVideoOmniProvider(option.value);
            found = true;
            break;
        }
    }
    
    // 如果没有匹配项，使用自定义
    if (!found && currentUrl) {
        providerSelect.value = 'custom';
        customInput.style.display = 'block';
        customInput.querySelector('input').value = currentUrl;
        registerLinks.classList.add('d-none');
    }
}

// 更新视频理解提供商
function updateVideoOmniProvider(providerId) {
    const providerSelect = document.getElementById('video_omni_provider_select');
    const selectedOption = providerSelect.options[providerSelect.selectedIndex];
    const urlInput = document.getElementById('{{ key }}');
    const customInput = document.getElementById('customVideoOmniInput');
    const registerLinks = document.getElementById('video_omni_register_links');
    
    if (providerId === 'custom') {
        // 显示自定义输入框
        customInput.style.display = 'block';
        customInput.querySelector('input').value = urlInput.value || '';
        registerLinks.classList.add('d-none');
    } else {
        // 隐藏自定义输入框
        customInput.style.display = 'none';
        
        // 获取并设置URL
        const apiUrl = selectedOption.getAttribute('data-url');
        if (apiUrl) {
            urlInput.value = apiUrl;
        }
        
        // 显示注册链接
        const registerUrl = selectedOption.getAttribute('data-register');
        if (registerUrl) {
            registerLinks.classList.remove('d-none');
        } else {
            registerLinks.classList.add('d-none');
        }
    }
}

// 更新自定义URL
function updateCustomVideoOmniUrl(value) {
    const urlInput = document.getElementById('{{ key }}');
    if (value) {
        urlInput.value = value;
    }
}

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    initVideoOmniProvider();
});
</script>
