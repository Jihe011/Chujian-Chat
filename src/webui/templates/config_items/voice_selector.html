<!-- 音色选择器组件 -->
<div class="voice-selector-wrapper">
    <!-- 音色选择下拉框 -->
    <select class="form-select" id="{{ key }}" name="{{ key }}">
        <option value="" disabled selected>请选择音色...</option>
        {% for voice in voices %}
        <option value="{{ voice.name }}" {% if config.value == voice.name %}selected{% endif %}>
            {{ voice.name }} - {{ voice.description[:50] }}{% if voice.description|length > 50 %}...{% endif %}
        </option>
        {% endfor %}
    </select>

    <!-- 音色预览按钮 -->
    <div class="mt-2">
        <button type="button" class="btn btn-sm btn-outline-primary" onclick="previewVoice('{{ key }}')">
            <i class="bi bi-play-circle me-1"></i>预览音色
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="showVoiceSelector()">
            <i class="bi bi-search me-1"></i>音色选择器
        </button>
    </div>

    <!-- 音色预览音频播放器（隐藏） -->
    <audio id="voice-preview-audio" style="display: none;"></audio>

    <!-- 音色详情显示区域 -->
    <div id="voice-details-{{ key }}" class="mt-3 p-3 rounded" style="display: none;">
        <h6>音色详情</h6>
        <div id="voice-details-content"></div>
    </div>
</div>

<!-- 音色选择器模态框 -->
<div class="modal fade" id="voiceSelectorModal" tabindex="-1" aria-labelledby="voiceSelectorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="voiceSelectorModalLabel">音色选择器</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <!-- 筛选区域 -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">性别筛选</label>
                        <select class="form-select" id="voiceGenderFilter">
                            <option value="">全部</option>
                            <option value="female">女性</option>
                            <option value="male">男性</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">风格筛选</label>
                        <select class="form-select" id="voiceStyleFilter">
                            <option value="">全部</option>
                            <option value="温柔">温柔</option>
                            <option value="活泼">活泼</option>
                            <option value="成熟">成熟</option>
                            <option value="可爱">可爱</option>
                            <option value="专业">专业</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">关键词搜索</label>
                        <input type="text" class="form-control" id="voiceSearchInput" placeholder="搜索音色...">
                    </div>
                </div>

                <!-- 音色列表 -->
                <div id="voiceList" class="row g-3">
                    <!-- 音色卡片将通过JavaScript动态加载 -->
                </div>

                <!-- 加载状态 -->
                <div id="voiceListLoading" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-2">正在加载音色列表...</p>
                </div>

                <!-- 错误提示 -->
                <div id="voiceListError" class="alert alert-danger" style="display: none;">
                    加载音色列表失败
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 音色预览模态框 -->
<div class="modal fade" id="voicePreviewModal" tabindex="-1" aria-labelledby="voicePreviewModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="voicePreviewModalLabel">音色预览</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">预览文本</label>
                    <textarea class="form-control" id="previewText" rows="3">你好，这是一个音色预览。</textarea>
                </div>
                <div id="previewResult" class="text-center">
                    <button type="button" class="btn btn-primary" onclick="generatePreview()">
                        <i class="bi bi-play-circle me-1"></i>生成预览
                    </button>
                    <div id="previewAudioContainer" class="mt-3"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
// 全局变量
let currentVoiceKey = '';
let allVoices = [];
let filteredVoices = [];

// 页面加载时初始化音色选择器
document.addEventListener('DOMContentLoaded', function() {
    // 为音色选择器添加事件监听
    const voiceSelect = document.getElementById('{{ key }}');
    if (voiceSelect) {
        voiceSelect.addEventListener('change', function() {
            const selectedVoice = this.value;
            if (selectedVoice) {
                showVoiceDetails(selectedVoice);
            }
        });
    }

    // 为筛选器添加事件监听
    const genderFilter = document.getElementById('voiceGenderFilter');
    const styleFilter = document.getElementById('voiceStyleFilter');
    const searchInput = document.getElementById('voiceSearchInput');

    if (genderFilter) {
        genderFilter.addEventListener('change', filterVoices);
    }
    if (styleFilter) {
        styleFilter.addEventListener('change', filterVoices);
    }
    if (searchInput) {
        searchInput.addEventListener('input', filterVoices);
    }

    // 加载音色列表
    loadVoiceList();
});

// 加载音色列表
function loadVoiceList() {
    const loadingDiv = document.getElementById('voiceListLoading');
    const errorDiv = document.getElementById('voiceListError');
    const voiceListDiv = document.getElementById('voiceList');

    if (loadingDiv) loadingDiv.style.display = 'block';
    if (errorDiv) errorDiv.style.display = 'none';
    if (voiceListDiv) voiceListDiv.innerHTML = '';

    fetch('/api/tts/voices')
        .then(response => response.json())
        .then(data => {
            if (loadingDiv) loadingDiv.style.display = 'none';

            if (data.status === 'success') {
                allVoices = data.voices;
                filteredVoices = data.voices;
                renderVoiceList();
            } else {
                if (errorDiv) {
                    errorDiv.textContent = data.message || '加载音色列表失败';
                    errorDiv.style.display = 'block';
                }
            }
        })
        .catch(error => {
            if (loadingDiv) loadingDiv.style.display = 'none';
            if (errorDiv) {
                errorDiv.textContent = '网络错误: ' + error.message;
                errorDiv.style.display = 'block';
            }
        });
}

// 渲染音色列表
function renderVoiceList() {
    const voiceListDiv = document.getElementById('voiceList');
    if (!voiceListDiv) return;

    voiceListDiv.innerHTML = '';

    if (filteredVoices.length === 0) {
        voiceListDiv.innerHTML = '<div class="col-12 text-center py-4"><p>没有找到匹配的音色</p></div>';
        return;
    }

    filteredVoices.forEach(voice => {
        const card = document.createElement('div');
        card.className = 'col-md-6 col-lg-4';
        card.innerHTML = `
            <div class="card h-100">
                <div class="card-body">
                    <h6 class="card-title">${voice.name}</h6>
                    <p class="card-text small text-muted">
                        <span class="badge bg-secondary me-1">${voice.gender === 'female' ? '女性' : '男性'}</span>
                        ${voice.style ? `<span class="badge bg-info me-1">${voice.style}</span>` : ''}
                    </p>
                    <p class="card-text small">${voice.description}</p>
                </div>
                <div class="card-footer bg-transparent">
                    <button type="button" class="btn btn-sm btn-outline-primary me-1" onclick="selectVoice('${voice.name}')">
                        <i class="bi bi-check-circle me-1"></i>选择
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="previewVoiceFromSelector('${voice.name}')">
                        <i class="bi bi-play-circle me-1"></i>预览
                    </button>
                </div>
            </div>
        `;
        voiceListDiv.appendChild(card);
    });
}

// 筛选音色
function filterVoices() {
    const genderFilter = document.getElementById('voiceGenderFilter');
    const styleFilter = document.getElementById('voiceStyleFilter');
    const searchInput = document.getElementById('voiceSearchInput');

    const gender = genderFilter ? genderFilter.value : '';
    const style = styleFilter ? styleFilter.value : '';
    const search = searchInput ? searchInput.value.toLowerCase() : '';

    filteredVoices = allVoices.filter(voice => {
        // 性别筛选
        if (gender && voice.gender !== gender) {
            return false;
        }

        // 风格筛选
        if (style && voice.style !== style) {
            return false;
        }

        // 关键词搜索
        if (search) {
            const searchableText = `${voice.name} ${voice.description} ${voice.style || ''}`.toLowerCase();
            if (!searchableText.includes(search)) {
                return false;
            }
        }

        return true;
    });

    renderVoiceList();
}

// 选择音色
function selectVoice(voiceName) {
    const voiceSelect = document.getElementById('{{ key }}');
    if (voiceSelect) {
        voiceSelect.value = voiceName;
        // 触发change事件
        voiceSelect.dispatchEvent(new Event('change'));
    }

    // 关闭模态框
    const modal = bootstrap.Modal.getInstance(document.getElementById('voiceSelectorModal'));
    if (modal) {
        modal.hide();
    }

    // 显示成功消息
    showToast('已选择音色: ' + voiceName, 'success');
}

// 显示音色详情
function showVoiceDetails(voiceName) {
    const detailsDiv = document.getElementById('voice-details-{{ key }}');
    const contentDiv = document.getElementById('voice-details-content');

    if (!detailsDiv || !contentDiv) return;

    const voice = allVoices.find(v => v.name === voiceName);
    if (voice) {
        contentDiv.innerHTML = `
            <p><strong>音色名称:</strong> ${voice.name}</p>
            <p><strong>性别:</strong> ${voice.gender === 'female' ? '女性' : '男性'}</p>
            ${voice.style ? `<p><strong>风格:</strong> ${voice.style}</p>` : ''}
            <p><strong>描述:</strong> ${voice.description}</p>
            <p><strong>适用场景:</strong> ${voice.use_case || '通用'}</p>
        `;
        detailsDiv.style.display = 'block';
    } else {
        detailsDiv.style.display = 'none';
    }
}

// 预览音色（从主界面）
function previewVoice(key) {
    const voiceSelect = document.getElementById(key);
    if (!voiceSelect) return;

    const voiceName = voiceSelect.value;
    if (!voiceName) {
        showToast('请先选择一个音色', 'warning');
        return;
    }

    currentVoiceKey = key;
    showPreviewModal(voiceName);
}

// 预览音色（从选择器）
function previewVoiceFromSelector(voiceName) {
    currentVoiceKey = '{{ key }}';
    showPreviewModal(voiceName);
}

// 显示预览模态框
function showPreviewModal(voiceName) {
    const modalElement = document.getElementById('voicePreviewModal');
    let modal = bootstrap.Modal.getInstance(modalElement);
    if (!modal) {
        modal = new bootstrap.Modal(modalElement);
    }
    modal.show();

    // 设置预览文本
    const previewText = document.getElementById('previewText');
    if (previewText) {
        previewText.value = `你好，我是${voiceName}，这是一个音色预览。`;
    }
}

// 生成预览
function generatePreview() {
    const voiceSelect = document.getElementById(currentVoiceKey);
    if (!voiceSelect) return;

    const voiceName = voiceSelect.value;
    const previewText = document.getElementById('previewText');
    const previewAudioContainer = document.getElementById('previewAudioContainer');

    if (!voiceName) {
        showToast('请先选择一个音色', 'warning');
        return;
    }

    if (!previewText || !previewAudioContainer) return;

    // 显示加载状态
    previewAudioContainer.innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">生成中...</span></div>';

    fetch('/api/tts/voice-preview', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            voice: voiceName,
            text: previewText.value
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            // 播放音频
            const audioUrl = `/api/tts/audio/${data.audio_path}`;
            previewAudioContainer.innerHTML = `
                <audio controls class="w-100 mt-2">
                    <source src="${audioUrl}" type="audio/wav">
                    您的浏览器不支持音频播放
                </audio>
            `;
            showToast('预览音频生成成功', 'success');
        } else {
            previewAudioContainer.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            showToast('预览音频生成失败', 'error');
        }
    })
    .catch(error => {
        previewAudioContainer.innerHTML = `<div class="alert alert-danger">网络错误: ${error.message}</div>`;
        showToast('网络错误', 'error');
    });
}

// 显示音色选择器模态框
function showVoiceSelector() {
    const modalElement = document.getElementById('voiceSelectorModal');
    let modal = bootstrap.Modal.getInstance(modalElement);
    if (!modal) {
        modal = new bootstrap.Modal(modalElement);
    }
    modal.show();
}

// 显示提示消息
function showToast(message, type = 'info') {
    // 创建提示元素
    const toast = document.createElement('div');
    toast.className = `alert alert-${type === 'success' ? 'success' : type === 'error' ? 'danger' : type === 'warning' ? 'warning' : 'info'} position-fixed top-0 end-0 m-3`;
    toast.style.zIndex = '9999';
    toast.innerHTML = `
        <button type="button" class="btn-close float-end" data-bs-dismiss="alert"></button>
        ${message}
    `;

    document.body.appendChild(toast);

    // 3秒后自动移除
    setTimeout(() => {
        if (toast.parentNode) {
            toast.parentNode.removeChild(toast);
        }
    }, 3000);
}
</script>

<style>
.voice-selector-wrapper {
    position: relative;
}

.voice-selector-wrapper .form-select {
    padding-right: 2.5rem;
}

.voice-selector-wrapper .btn {
    margin-right: 0.5rem;
}

.voice-selector-wrapper .btn:last-child {
    margin-right: 0;
}

#voiceList .card {
    transition: transform 0.2s;
}

#voiceList .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

#voiceList .card-footer {
    border-top: 1px solid #dee2e6;
}

#voiceList .card-footer .btn {
    width: calc(50% - 0.25rem);
}

#voice-details-{{ key }} {
    border-left: 4px solid #0d6efd;
}

#voice-details-{{ key }} p {
    margin-bottom: 0.5rem;
}

#voice-details-{{ key }} strong {
    color: #0d6efd;
}
</style>
