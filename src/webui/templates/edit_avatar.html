    <script>
        var currentAvatar = null;
        var avatars = [];
        
document.addEventListener('DOMContentLoaded', function() {
  // 加载背景图片
  fetch('/get_background')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'success' && data.path) {
        document.body.style.backgroundImage = 'url(' + data.path + ')';
      }
    })
    .catch(function(err) {
      console.error('加载背景失败:', err);
    });

  loadAvatarsList();
  initUploadZone();
  document.getElementById('createAvatarBtn').addEventListener('click', doCreateAvatar);
  document.getElementById('confirmDeleteBtn').addEventListener('click', doDeleteAvatar);
});
        
        function loadAvatarsList() {
            fetch('/get_available_avatars')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.status === 'success') {
                        avatars = data.avatars || [];
                        var select = document.getElementById('avatarSelect');
                        select.innerHTML = '<option value="">选择人设...</option>';
                        avatars.forEach(function(avatar) {
                            var name = avatar.replace('data/avatars/', '');
                            var option = document.createElement('option');
                            option.value = name;
                            option.textContent = name;
                            select.appendChild(option);
});
  }
})
.catch(console.error);
}

function loadUserList() {
  var avatarName = document.getElementById('avatarSelect').value;
  if (!avatarName) return;
  var userSelect = document.getElementById('userSelect');
  fetch('/get_avatar_users?avatar=' + encodeURIComponent(avatarName))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      userSelect.innerHTML = '';
      if (data.users.length === 0) {
        data.users = ['default'];
      }
      data.users.forEach(function(user) {
        var option = document.createElement('option');
        option.value = user;
        option.textContent = user;
        userSelect.appendChild(option);
      });
      var lastUser = localStorage.getItem('lastSelectedUser_' + avatarName);
      if (lastUser && data.users.includes(lastUser)) {
        userSelect.value = lastUser;
      }
    }
  })
  .catch(console.error);
}

function editCoreMemory() {
  var avatarName = document.getElementById('avatarSelect').value;
  var userId = document.getElementById('userSelect').value;
  if (!avatarName) return;
  fetch('/load_core_memory?avatar=' + encodeURIComponent(avatarName) + '&user_id=' + encodeURIComponent(userId))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      var modalHTML = '<div class="modal fade" id="coreMemoryModal" tabindex="-1">' +
        '<div class="modal-dialog modal-lg modal-dialog-centered">' +
        '<div class="modal-content">' +
        '<div class="modal-header">' +
        '<h5 class="modal-title"><i class="bi bi-database-fill me-2"></i>核心记忆编辑</h5>' +
        '<button type="button" class="btn-close" data-bs-dismiss="modal"></button>' +
        '</div>' +
        '<div class="modal-body">' +
        '<div class="alert alert-info"><i class="bi bi-info-circle-fill"></i> 核心记忆包含角色对用户的长期印象和关键信息。</div>' +
        '<textarea class="form-control" id="coreMemoryContent" rows="10" style="min-height: 200px; max-height: 50vh; resize: vertical;">' + (data.content || '') + '</textarea>' +
        '</div>' +
        '<div class="modal-footer">' +
        '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>' +
        '<button type="button" class="btn btn-danger" id="clearCoreMemoryBtn">清空</button>' +
        '<button type="button" class="btn btn-primary" id="saveCoreMemoryBtn">保存</button>' +
        '</div></div></div></div>';
      document.body.insertAdjacentHTML('beforeend', modalHTML);
      var modal = new bootstrap.Modal(document.getElementById('coreMemoryModal'));
      modal.show();
      document.getElementById('saveCoreMemoryBtn').addEventListener('click', function() {
        var content = document.getElementById('coreMemoryContent').value;
        fetch('/save_core_memory', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ avatar: avatarName, user_id: userId, content: content })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.status === 'success') {
            showToast('核心记忆已保存', 'success');
            modal.hide();
            document.getElementById('coreMemoryModal').remove();
          } else {
            showToast('保存失败', 'error');
          }
        });
      });
      document.getElementById('clearCoreMemoryBtn').addEventListener('click', function() {
        if (confirm('确定要清空核心记忆吗？')) {
          document.getElementById('coreMemoryContent').value = '';
        }
      });
      document.getElementById('coreMemoryModal').addEventListener('hidden.bs.modal', function() {
        this.remove();
      });
    }
  });
}

function editShortMemory() {
  var avatarName = document.getElementById('avatarSelect').value;
  var userId = document.getElementById('userSelect').value;
  if (!avatarName) return;
  fetch('/load_short_memory?avatar=' + encodeURIComponent(avatarName) + '&user_id=' + encodeURIComponent(userId))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      var conversations = data.conversations || [];
      var modalHTML = '<div class="modal fade" id="shortMemoryModal" tabindex="-1">' +
        '<div class="modal-dialog modal-xl modal-dialog-centered">' +
        '<div class="modal-content">' +
        '<div class="modal-header">' +
        '<h5 class="modal-title"><i class="bi bi-chat-dots me-2"></i>短期记忆编辑</h5>' +
        '<button type="button" class="btn-close" data-bs-dismiss="modal"></button>' +
        '</div>' +
        '<div class="modal-body">' +
        '<div class="alert alert-info"><i class="bi bi-info-circle-fill"></i> 短期记忆包含最近的对话历史。</div>' +
        '<div class="d-flex justify-content-end mb-3">' +
        '<button type="button" class="btn btn-sm btn-success me-2" id="addConversationBtn"><i class="bi bi-plus-circle"></i> 添加对话</button>' +
        '<button type="button" class="btn btn-sm btn-danger" id="clearAllConversationsBtn"><i class="bi bi-trash"></i> 清空</button>' +
        '</div>' +
        '<div id="conversationsList" style="max-height: 60vh; overflow-y: auto;"></div>' +
        '</div>' +
        '<div class="modal-footer">' +
        '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>' +
        '<button type="button" class="btn btn-primary" id="saveShortMemoryBtn">保存</button>' +
        '</div></div></div></div>';
      document.body.insertAdjacentHTML('beforeend', modalHTML);
      var modal = new bootstrap.Modal(document.getElementById('shortMemoryModal'));
      modal.show();
      var conversationsData = [...conversations];

      function getTimestamp() {
        var now = new Date();
        return now.toISOString().replace('T', ' ').substring(0, 19);
      }

      window.updateConversationsList = function() {
        var container = document.getElementById('conversationsList');
        if (conversationsData.length === 0) {
          container.innerHTML = '<div class="text-center p-3 text-muted"><i class="bi bi-chat-square-text"></i> 暂无对话记录</div>';
          return;
        }
        container.innerHTML = conversationsData.map(function(conv, index) {
          return '<div class="card mb-3">' +
            '<div class="card-header d-flex justify-content-between align-items-center">' +
            '<small class="text-muted">' + (conv.timestamp || '未知时间') + '</small>' +
            '<button type="button" class="btn btn-sm btn-outline-danger deleteConvBtn" data-index="' + index + '"><i class="bi bi-trash"></i></button>' +
            '</div>' +
            '<div class="card-body">' +
            '<div class="mb-2"><label class="form-label fw-bold">用户消息</label><textarea class="form-control user-msg" rows="2" data-index="' + index + '">' + (conv.user || '') + '</textarea></div>' +
            '<div><label class="form-label fw-bold">系统回复</label><textarea class="form-control bot-msg" rows="2" data-index="' + index + '">' + (conv.bot || '') + '</textarea></div>' +
            '</div></div>';
        }).join('');

        container.querySelectorAll('.deleteConvBtn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var idx = parseInt(this.dataset.index);
            conversationsData.splice(idx, 1);
            window.updateConversationsList();
          });
        });

        container.querySelectorAll('.user-msg').forEach(function(textarea) {
          textarea.addEventListener('input', function() {
            var idx = parseInt(this.dataset.index);
            conversationsData[idx].user = this.value;
          });
        });

        container.querySelectorAll('.bot-msg').forEach(function(textarea) {
          textarea.addEventListener('input', function() {
            var idx = parseInt(this.dataset.index);
            conversationsData[idx].bot = this.value;
          });
        });
      };

      window.updateConversationsList();

      document.getElementById('addConversationBtn').addEventListener('click', function() {
        conversationsData.push({ timestamp: getTimestamp(), user: '', bot: '' });
        window.updateConversationsList();
      });

      document.getElementById('clearAllConversationsBtn').addEventListener('click', function() {
        if (confirm('确定要清空所有对话吗？')) {
          conversationsData = [];
          window.updateConversationsList();
        }
      });

      document.getElementById('saveShortMemoryBtn').addEventListener('click', function() {
        fetch('/save_short_memory', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ avatar: avatarName, user_id: userId, conversations: conversationsData })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.status === 'success') {
            showToast('短期记忆已保存', 'success');
            modal.hide();
            document.getElementById('shortMemoryModal').remove();
          } else {
            showToast('保存失败', 'error');
          }
        });
      });

      document.getElementById('shortMemoryModal').addEventListener('hidden.bs.modal', function() {
        this.remove();
      });
    }
  });
}

function loadAvatar() {
  var select = document.getElementById('avatarSelect');
  var name = select.value;

  if (!name) {
    document.getElementById('editorArea').style.display = 'none';
    document.getElementById('avatarToolbar').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  currentAvatar = name;
  document.getElementById('editorArea').style.display = 'block';
  document.getElementById('avatarToolbar').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  loadUserList();

  fetch('/load_avatar_content?avatar=' + encodeURIComponent(name))
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      var content = data.content || {};
      document.getElementById('taskEditor').value = content.task || '';
      document.getElementById('roleEditor').value = content.role || '';
      document.getElementById('appearanceEditor').value = content.appearance || '';
      document.getElementById('experienceEditor').value = content.experience || '';
      document.getElementById('personalityEditor').value = content.personality || '';
      document.getElementById('linesEditor').value = content.classic_lines || '';
      document.getElementById('preferencesEditor').value = content.preferences || '';
      document.getElementById('notesEditor').value = content.notes || '';
    } else {
      console.error('加载人设失败:', data.message);
    }
  })
  .catch(function(e) {
    console.error('加载人设失败:', e);
  });
}

function toggleEditor(header) {
            header.classList.toggle('collapsed');
            var body = header.nextElementSibling;
            body.classList.toggle('show');
        }
        
        function initUploadZone() {
            var zone = document.getElementById('uploadZone');
            var input = document.getElementById('emojiInput');
            if (!zone || !input) return;
            
            zone.addEventListener('click', function() { input.click(); });
            zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
            zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
            input.addEventListener('change', function() { handleFiles(input.files); });
        }
        
        function handleFiles(files) {
            Array.from(files).forEach(function(file) {
                if (!file.type.startsWith('image/')) return;
                var reader = new FileReader();
                reader.onload = function(e) { addEmojiItem(e.target.result, file.name); };
                reader.readAsDataURL(file);
            });
        }
        
        function addEmojiItem(src, name) {
            var grid = document.getElementById('emojisGrid');
            var item = document.createElement('div');
            item.className = 'emoji-item';
            item.innerHTML = '<img src="' + src + '" alt="' + name + '"><button type="button" class="delete-btn" onclick="deleteEmoji(this)"><i class="bi bi-x"></i></button>';
            grid.appendChild(item);
            updateEmojiCount();
        }
        
        function deleteEmoji(btn) {
            btn.closest('.emoji-item').remove();
            updateEmojiCount();
        }
        
        function updateEmojiCount() {
            document.getElementById('emojiCount').textContent = document.querySelectorAll('.emoji-item').length;
        }
        
function createNewAvatar() {
  document.getElementById('newAvatarName').value = '';
  new bootstrap.Modal(document.getElementById('newAvatarModal')).show();
  document.getElementById('newAvatarName').focus();
}

function doCreateAvatar() {
  var name = document.getElementById('newAvatarName').value.trim();
  if (!name) {
    showToast('请输入人设名称', 'warning');
    return;
  }
  if (!/^[a-zA-Z0-9_]+$/.test(name)) {
    showToast('人设名称只能包含英文字母、数字和下划线', 'error');
    return;
  }
  fetch('/create_avatar', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ avatar_name: name })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      showToast('人设创建成功', 'success');
      bootstrap.Modal.getInstance(document.getElementById('newAvatarModal')).hide();
      document.getElementById('newAvatarName').value = '';
      loadAvatarsList();
      document.getElementById('avatarSelect').value = name;
      loadAvatar();
    } else {
      showToast('创建失败: ' + data.message, 'error');
    }
  })
  .catch(function(e) {
    showToast('创建失败: ' + e, 'error');
  });
}

function deleteAvatar() {
  if (!currentAvatar) {
    showToast('请先选择一个人设', 'warning');
    return;
  }
  document.getElementById('deleteAvatarName').textContent = currentAvatar;
  new bootstrap.Modal(document.getElementById('deleteAvatarModal')).show();
}

function doDeleteAvatar() {
  fetch('/delete_avatar', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ avatar_name: currentAvatar })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      showToast('人设已删除', 'success');
      bootstrap.Modal.getInstance(document.getElementById('deleteAvatarModal')).hide();
      currentAvatar = null;
      document.getElementById('editorArea').style.display = 'none';
      document.getElementById('avatarToolbar').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      loadAvatarsList();
    } else {
      showToast('删除失败: ' + data.message, 'error');
    }
  })
  .catch(function(e) {
    showToast('删除失败: ' + e, 'error');
  });
}

        function showToast(msg, type) {
            var toast = document.createElement('div');
            toast.className = 'toast position-fixed bottom-0 end-0 p-3';
            toast.setAttribute('role', 'alert');
            var bgMap = {success: 'bg-success', error: 'bg-danger', warning: 'bg-warning', info: 'bg-info'};
            toast.classList.add(bgMap[type] || 'bg-info');
            if (type !== 'warning') toast.classList.add('text-white');
            toast.innerHTML = '<div class="toast-body">' + msg + '<button type="button" class="btn-close me-2" data-bs-dismiss="toast"></button></div>';

            new bootstrap.Toast(toast).show();
